name: CI/CD Workflow

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Print Branch and Commit
        run: |
          echo "Branch: ${{ github.ref }}"
          echo "Commit ID: ${{ github.sha }}"

      - name: Build Step
        run: echo "Building application..."

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test Step
        run: echo "Running tests..."

      - name: Validate Code
        run: echo "Code validation passed"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'   # 👈 runs only after merge
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker Build and Push
        env:
          REGISTRY: docker.io
          REPOSITORY: dhanuj16/demo-app
          IMAGE_TAG: latest
        run: |
          echo "Building Docker image..."
          docker build --build-arg ENV=dev -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .

          echo "Pushing Docker image..."
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

          echo "Removing local image..."
          docker rmi $REGISTRY/$REPOSITORY:$IMAGE_TAG
